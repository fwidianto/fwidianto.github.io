name: Deploy ERP Dashboard to PythonAnywhere

on:
  push:
    branches:
      - repo-cleanup-audit
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy ERP Dashboard to PythonAnywhere via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PYTHONANYWHERE_HOST }}
          username: ${{ secrets.PYTHONANYWHERE_USERNAME }}
          password: ${{ secrets.PYTHONANYWHERE_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            cd ~/fwidianto.github.io
            
            # Pull latest changes
            git pull origin repo-cleanup-audit
            
            # Sync AI-ERP-IntelligenceDashboard folder
            rsync -avz --delete ~/fwidianto.github.io/Projects/AI-ERP-IntelligenceDashboard/ ~/erp-dashboard/
            
            # Create necessary directories
            mkdir -p ~/erp-dashboard/database ~/erp-dashboard/output
            
            # Install dependencies
            pip install --user -r ~/erp-dashboard/requirements.txt
            
            # Generate database (only if database doesn't exist or is empty)
            if [ ! -f ~/erp-dashboard/database/erp_database.db ] || [ $(wc -c < ~/erp-dashboard/database/erp_database.db) -lt 1000 ]; then
              echo "Generating ERP database..."
              cd ~/erp-dashboard
              python scripts/generate_erp_data.py
              python scripts/run_etl.py
            fi
            
            # Touch wsgi to reload
            touch ~/erp_dashboard_wsgi.py