<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERP Analytics Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-tertiary: #0f172a;
            --text-primary: #f3f4f6;
            --text-secondary: #d1d5db;
            --text-muted: #9ca3af;
            --primary: #60a5fa;
            --primary-hover: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        /* Top Navigation */
        .top-nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            color: white;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .top-nav-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-tabs {
            display: flex;
            gap: 4px;
        }
        
        .nav-tab {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .nav-tab:hover {
            background: var(--bg-tertiary);
            color: var(--primary);
        }
        
        .nav-tab.active {
            background: rgba(96, 165, 250, 0.12);
            color: var(--primary);
        }
        
        .top-nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .module-switch {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .module-switch:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* Main Content */
        .main-content {
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .page-header {
            margin-bottom: 24px;
        }
        
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .page-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .kpi-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        
        .kpi-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        
        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .kpi-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        
        .kpi-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .kpi-icon.blue { background: rgba(96, 165, 250, 0.15); }
        .kpi-icon.green { background: rgba(34, 197, 94, 0.15); }
        .kpi-icon.purple { background: rgba(168, 85, 247, 0.15); }
        .kpi-icon.orange { background: rgba(245, 158, 11, 0.15); }
        .kpi-icon.red { background: rgba(239, 68, 68, 0.15); }
        .kpi-icon.teal { background: rgba(20, 184, 166, 0.15); }
        
        .kpi-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .kpi-change {
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .kpi-change.up { color: var(--success); }
        .kpi-change.down { color: var(--danger); }
        
        /* Chart Cards */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .chart-grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        
        .chart-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .chart-container {
            position: relative;
            height: 280px;
        }
        
        .chart-container.tall {
            height: 350px;
        }
        
        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
        }
        
        .data-table td {
            padding: 12px 16px;
            font-size: 0.875rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        
        .data-table tr:hover {
            background: var(--bg-tertiary);
        }
        
        .data-table .number {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        
        .data-table .positive {
            color: var(--success);
        }
        
        .data-table .negative {
            color: var(--danger);
        }
        
        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-success { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .badge-info { background: rgba(96, 165, 250, 0.15); color: var(--primary); }
        
        /* Funnel */
        .funnel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 300px;
            margin: 0 auto;
        }
        
        .funnel-stage {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            text-align: center;
            position: relative;
        }
        
        .funnel-stage:nth-child(2) { width: 85%; }
        .funnel-stage:nth-child(3) { width: 70%; }
        .funnel-stage:nth-child(4) { width: 55%; }
        
        .funnel-value {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .funnel-label {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        
        .funnel-rate {
            position: absolute;
            right: -60px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        
        /* Aging Bar */
        .aging-bar {
            display: flex;
            height: 40px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        
        .aging-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 40px;
        }
        
        .aging-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .aging-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .aging-legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                height: auto;
                padding: 12px;
                gap: 12px;
            }
            .nav-tabs {
                flex-wrap: wrap;
            }
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            .main-content {
                padding: 16px;
            }
        }
        
        /* Number formatting */
        .format-number {
            font-variant-numeric: tabular-nums;
        }
        
        /* Progress bars */
        .progress-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        /* Sparkline container */
        .sparkline-container {
            height: 30px;
            width: 100px;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="top-nav-left">
            <a href="{{ url_for('dashboard.executive') }}" class="logo">
                📊 ERP Analytics
            </a>
            <div class="nav-tabs">
                <a href="{{ url_for('dashboard.executive') }}" class="nav-tab {% if request.endpoint == 'dashboard.executive' %}active{% endif %}">
                    📈 Executive
                </a>
                <a href="{{ url_for('dashboard.sales') }}" class="nav-tab {% if request.endpoint == 'dashboard.sales' %}active{% endif %}">
                    💰 Sales
                </a>
                <a href="{{ url_for('dashboard.purchasing') }}" class="nav-tab {% if request.endpoint == 'dashboard.purchasing' %}active{% endif %}">
                    🛒 Purchasing
                </a>
                <a href="{{ url_for('dashboard.inventory') }}" class="nav-tab {% if request.endpoint == 'dashboard.inventory' %}active{% endif %}">
                    📦 Inventory
                </a>
                <a href="{{ url_for('dashboard.aging') }}" class="nav-tab {% if request.endpoint == 'dashboard.aging' %}active{% endif %}">
                    📋 AR/AP Aging
                </a>
            </div>
        </div>
        <div class="top-nav-right">
            <a href="/" class="module-switch">
                🔍 Data Explorer
            </a>
            <span style="font-size: 0.8rem; opacity: 0.7;">
                {{ now.strftime('%B %d, %Y') if now else '' }}
            </span>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    {% block scripts %}{% endblock %}
</body>
</html>
